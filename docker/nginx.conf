# HTTP — ACME challenge for Let's Encrypt + redirect to HTTPS
server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge directory
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — game client auth and SiteConfig
server {
    listen 443 ssl;
    server_name _;

    # SSL certificates — Let's Encrypt certs take priority, falls back to self-signed
    ssl_certificate     /etc/nginx/ssl/live/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Serve SiteConfig.xml to game clients
    location /SiteConfig.xml {
        root /usr/share/nginx/html;
    }

    # Proxy /AuthServer requests to MHServerEmu web frontend
    # Use variable to avoid nginx failing on startup if mhserveremu isn't ready yet
    resolver 127.0.0.11 valid=30s;
    set $upstream http://mhserveremu:8080;

    location /AuthServer/ {
        rewrite ^/AuthServer(/.*)$ $1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}