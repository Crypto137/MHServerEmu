<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Add G</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
	
	<style>
		html {
			background-color: #0d0d0b;
			color: #d7d7d7;
			font: 18px/1.385 Verdana;
		}

		*:focus, *:active {
			outline: none;
			box-shadow: none;
		}

		h1, h2, h3, h4, h5, h6 {
			color: #00aaff;
			font-family: "Bebas Neue", "Trebuchet MS", Verdana, sans-serif;
			font-weight: normal;
		}

		button, input {
			box-sizing: border-box;
			border: 1px solid black;
			background: #1c1c1c;
			color: inherit;
			font: inherit;
		}

		input {
			width: 100%;
			text-align: center;
		}

		input[type="range"] {
		    -webkit-appearance: none;
			appearance: none;
			margin: 4px 0px;
			background: transparent;
			vertical-align: middle;
		}

		input[type="text"] {	
			box-sizing: border-box;
			height: 30px;
			border: 1px solid #505350;			
			border-radius: 4px;
			background: linear-gradient(
				#010501 0%, 
				#120F0E 10%,
				#252525 100%
			);
			height: 30px;
			width: 70px;
			color: white;
			font-family: "Bebas Neue", "Trebuchet MS", Verdana, sans-serif;
			font-size: 24px;
			line-height: 24px;
			vertical-align: middle;
		}	
		
		input[type="range"]::-webkit-slider-runnable-track {
			height: 8px;
			background: black;
			background-image: url('data:image/svg+xml;utf8,<svg width="52" height="20" viewBox="0 0 52 20" xmlns="http://www.w3.org/2000/svg"><rect x="10" width="50" height="20" fill="black"/><rect x="15" width="2" height="20" fill="%233C3C3D"/></svg>');
			background-repeat: repeat;
			border-radius: 4px;
			box-shadow: inset 0 1px 1px rgba(0,0,0,0.3);
		}
		
		input[type="range"]::-webkit-slider-thumb {
			-webkit-appearance: none;
			width: 26px;
			height: 16px;
			margin-top: -4px;
			border: 1px solid #41DAE5;
			border-radius: 4px;
			background: linear-gradient(
				-35deg,  
				#0082C3 45%,
				#23A4E5 55%,
				#1196D6 70%, 
				#0082C3 100%
			);			
			box-shadow:
				inset 0 0 8px rgba(255,255,255,0.6),
				0 0 8px rgba(65, 218, 229, 0.8);
		}

		table {
			width: 100%;
			margin: 12px 0px;
			border-spacing: 16px;
			border: 1px solid #383838;
			border-radius: 6px;
			box-shadow: inset 0 0 8px #383838;
		}

		div.content {
			margin: 10px auto;
			padding: 20px;
			border: 1px solid #00717c;
			background-color: #00090e;
		}

		div.button-container {
			display: flex;
			justify-content: center;
		}

		div.button-container button {
			width: 50%;
			margin: 0px 8px;
		}

		div.modal-popup {
			display: none;
			position: fixed;
			left: 0;
			top: 0;
			width: 100%;
			height: 100%;
			z-index: 1;
			background-color: rgba(0, 0, 0, 0.75);
			justify-content: center;
			align-items: center;
		}
		
		button {
			padding: 8px 40px 6px 40px;
			font: normal 23px / 20px "Bebas Neue", "Trebuchet MS", Verdana, sans-serif;
			color: white;
			border: 2px solid #1ac04c;
			cursor: pointer;
			border-radius: 5px;
			text-shadow: 1px 1px 2px black;
			text-transform: uppercase;    
			background: linear-gradient(337deg, #087A10 49%, #299F2C 51%, #0D7D16 70%, #087A10 100%);
			box-shadow: inset 0 0 8px #39cb42, 0 0 4px #39cb42;
		}

		button:hover {
			box-shadow: inset 0 0 8px #03ff0d, 0 0 4px #08cf10;
			background: linear-gradient(337deg, #009E08 49%, #30DF39 51%, #24992b 70%, #009E08 100%);
		}
		button.sign-button, button.close-button{
			border: 1px solid #4CF4F6;
			background: linear-gradient(337deg, #0082C3 49%, #29A6E7 51%, #007CB8 70%, #0082C3 100%);
			box-shadow: inset 0 0 8px #32B5F5, 0 0 4px #32B5F5;
		}
		button.sign-button{			
			font-size: 32px;
			line-height: 16px;
			vertical-align: middle;
			width: 32px;
			padding: 8px 8px 4px 8px;
			background: linear-gradient(337deg, #0082C3 49%, #29A6E7 51%, #007CB8 70%, #0082C3 100%);
			box-shadow: inset 0 0 8px #32B5F5;
		}			
		button.sign-button:hover{
			box-shadow: inset 0 0 8px #00f0ff;
			background: linear-gradient(337deg, #299ED9 49%, #4DC5FF 51%, #2f98cd 70%, #299ED9 100%);
		}		
		button.close-button:hover {
			box-shadow: inset 0 0 8px #00f0ff, 0 0 4px #26BFFA;
			background: linear-gradient(337deg, #299ED9 49%, #4DC5FF 51%, #2f98cd 70%, #299ED9 100%);
		}
		.center {
			text-align: center;
			width: 100%;
		}
		.g {
			color: #00090e;
			font: bold 18px / 1 Arial;
			text-shadow: 1px 2px 1px #00B2FE;			
			display: inline-flex;
			vertical-align: middle;
			align-items: center;
			justify-content: center;
			width: 26px;
			height: 26px;
			background: linear-gradient(
				-35deg,  
				#007FFF 45%,
				#03C2F7 54%,
				#00B2FE 70%, 
				#007FFF 100%
			);
			border: 1px solid #00B2FE;
			border-radius: 50%;
			margin-left: 8px;
		}
		.es {
			display: inline-block;
			vertical-align: middle;
			width: 48px;
		}
	</style>
</head>

					  <path fill="#E4F0F7" d="M68.9795 72.8649c0,0 2.448,2.33878 2.448,2.33878 0,0 0.92334,9.4666 1.30243,13.7964 0,0 -1.13877,2.97487 -1.13877,2.97487 0.097512,0.138709 -2.59163,-15.7081 -2.61166,-19.1101z"></path>
					 </g>
					</svg>
				</div>
				<input type="text" value="0" id="es-text-input" onchange="setES(this.value)" /></td>
				<td width="28"><button onclick="adjustES(-requestContext.conversionStep)" class="sign-button">-</button></td>
				<td><input type="range" value="0" min="0" id="es-range-input" onchange="setES(this.value)" /></td>
				<td width="28"><button onclick="adjustES(requestContext.conversionStep)" class="sign-button">+</button></td>
				<td style="width:108px;"><input type="text" value="0" id="g-text-input" onchange="setESFromG(this.value)" /><div class="g">G</div></td>
			</tr>
		</table>
		<p>Please note that the amount of G after conversion may be subject to rounding errors.</p>
		<div class="center">
			<button onclick="convert()">Convert</button>
		</div>
	</div>

	<div class="modal-popup" id="popup">
		<div class="content" style="width: 600px;">
			<div id="popup-low-balance">
				<p>You do not have enough Eternity Splinters to convert to G.</p>
				<div class="center">
					<button class="close-button" onclick="closePanel()">Close</button>
				</div>
			</div>
			<div id="popup-invalid-amount">
				<p>Please specify a valid amount of Eternity Splinters.</p>
				<div class="center">
					<button class="close-button" onclick="closePopup()">Close</button>
				</div>
			</div>
			<div id="popup-confirm">
				<p id="popup-confirm-text"></p>
				<div class="button-container">
					<button onclick="convertConfirm()">Confirm</button>
					<button class="close-button" onclick="closePopup()">Cancel</button>
				</div>
			</div>
			<div id="popup-pending">
				<p>Converting...</p>
			</div>
			<div id="popup-result">
				<p id="popup-result-text"></p>
				<div class="center">
					<button class="close-button" onclick="closePanel()">Close</button>
				</div>					
			</div>
		</div>
	</div>

	<script>
		var requestContext = Object.freeze({
			downloader: "%DOWNLOADER%",
			token: "%TOKEN%",
			email: "%EMAIL%",
			currentBalance: Math.max(Number("%CURRENT_BALANCE%"), 0),
			conversionRatio: Math.max(Number("%CONVERSION_RATIO%"), 0),
			conversionStep: Math.max(Number("%CONVERSION_STEP%"), 1),
		});

		var PopupType = Object.freeze({
			NONE: "",
			LOW_BALANCE: "popup-low-balance",
			INVALID_AMOUNT: "popup-invalid-amount",
			CONFIRM: "popup-confirm",
			PENDING: "popup-pending",
			RESULT: "popup-result",
		});

		var convertResult = 200;

		function showPopup(type) {
			var types = Object.keys(PopupType);
			for (var i = 0; i < types.length; i++) {
				itType = PopupType[types[i]];
				if (itType != PopupType.NONE) {
					document.getElementById(itType).style.display = "none";
				}
			}

			var popup = document.getElementById("popup");

			if (type != PopupType.NONE) {
				popup.style.display = "flex";
				document.getElementById(type).style.display = "block";
			} else {
				popup.style.display = "none";
			}
		}

		function closePopup() {
			showPopup(PopupType.NONE);
		}

		function getES() {
			return Number(document.getElementById("es-range-input").value);
		}

		function setES(esAmount) {
			var step = requestContext.conversionStep;
			var max = Math.floor(requestContext.currentBalance / step) * step;

			esAmount = Math.ceil(esAmount / step) * step;
			esAmount = Math.max(Math.min(esAmount, max), 0);

			if (isNaN(esAmount))
				esAmount = 0;

			document.getElementById("es-range-input").value = esAmount;
			document.getElementById("es-text-input").value = esAmount;
			document.getElementById("g-text-input").value = Math.floor(esAmount * requestContext.conversionRatio);
		}

		function setESFromG(gAmount) {
			var esAmount = Math.ceil(gAmount / requestContext.conversionRatio);
			setES(esAmount);
		}

		function adjustES(delta) {
			setES(getES() + delta);
		}

		function convert() {
			var esAmount = getES();
			if (esAmount <= 0) {
				showPopup(PopupType.INVALID_AMOUNT);
				return;
			}

			var confirmText = "Convert " + esAmount + " Eternity Splinters to " + Math.floor(esAmount * requestContext.conversionRatio) +" G?"
			document.getElementById("popup-confirm-text").innerText = confirmText;
			showPopup(PopupType.CONFIRM);
		}

		function convertConfirm() {
			showPopup(PopupType.PENDING);

			var convertRequest = {
				Email: requestContext.email,
				Token: requestContext.token,
				Amount: getES(),
			};

			var xhr = new XMLHttpRequest();
			xhr.open("POST", window.location.href + "/Submit", true);
			xhr.onreadystatechange = function() { handleReadyStateChange(xhr); };
			xhr.setRequestHeader("Content-Type", "application/json");
			xhr.send(JSON.stringify(convertRequest));
		}

		function handleReadyStateChange(xhr) {
			if (xhr.readyState != 4)
				return;

			convertResult = xhr.status;

			var confirmText = convertResult == 200 ? "Successfully converted." : "Conversion error (" + convertResult + ").";
			document.getElementById("popup-result-text").innerText = confirmText;
			showPopup(PopupType.RESULT);
		}

		function closePanel() {
			myApi.CloseAddGPanel(convertResult == 200);
		}

		function initialize() {
			var esRange = document.getElementById("es-range-input");
			var step = requestContext.conversionStep;
			var max = Math.floor(requestContext.currentBalance / step) * step;

			esRange.step = step;
			esRange.max = max;

			if (max == 0)
				showPopup(PopupType.LOW_BALANCE);
		}

		initialize();
	</script>
</body>
</html>
